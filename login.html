<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario Componente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <div class="encabezado">
      <h1 class="titulo"><span id="Formulariode">LO</span>GIN</h1>
    </div>

    <form novalidate>
      <div class="contenedor">
        <label>Ingresa tu correo electronico</label>
        <input type="email" placeholder="ejemplo@gmail.com" id="email" />

        <label>Ingresa tu contraseña</label>
        <input type="password" id="contraseña" />

        <button type="submit" id="btnEnviar" onclick="validar(event)">
          Iniciar sesion
        </button>
        <button type="button" id="btnLimpiar" onclick="limpiar()">
          Limpiar
        </button>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utileria.js"></script>
    <script src="js/login.js"></script>

    <footer class="foot">
      <p>ALUMNO: GOMEZ ROBLERO ANGEL JAHIR</p>
      <p>DOCENTE: MARTINEZ NIETO ADELINA</p>
      <p>MATERIA: PROGRAMACIÓN WEB</p>
    </footer>
  </body>
</html>
